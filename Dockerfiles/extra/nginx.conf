server {
	listen 80 default_server;
	gzip on;
	gzip_min_length 1000;
	gzip_types text/plain text/xml application/javascript text/css;
	root /app;
	server_tokens off;

	# index.html — never cache (exact match wins over regex below)
	location = /index.html {
		add_header Cache-Control "no-store";
		try_files $uri =404;
	}

	# All other static files — always revalidate with server (304 if unchanged)
	location ~ \. {
		add_header Cache-Control "no-cache";
		try_files $uri =404;
	}

	# SPA routes — serve index.html without caching
	location / {
		add_header Cache-Control "no-store";
		try_files $uri /index.html;
	}
}